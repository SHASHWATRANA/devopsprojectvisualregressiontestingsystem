name: Visual Regression CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Image
      run: docker build -t visual-regression-test -f infrastructure/docker/Dockerfile .

    - name: Run Tests Inside Docker
      run: docker run --name vr-test visual-regression-test

    - name: Copy Report From Container
      if: always()
      run: |
        docker cp vr-test:/app/tests/testdata/report.html report.html || true

    - name: Upload Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-report
        path: report.html
